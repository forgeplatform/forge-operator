{{- if not .Values.forge.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: forge-operator-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "forge-operator.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ required "forge.token (or forge.existingSecret) is required" .Values.forge.token | quote }}
{{- end }}
