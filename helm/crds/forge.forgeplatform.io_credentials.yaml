apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: credentials.forge.forgeplatform.io
spec:
  group: forge.forgeplatform.io
  names:
    kind: Credential
    listKind: CredentialList
    plural: credentials
    singular: credential
    shortNames: [cred]
    categories: [forge]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Forge ID
          type: integer
          jsonPath: .status.forgeId
        - name: Type
          type: string
          jsonPath: .spec.credentialType
        - name: Org
          type: string
          jsonPath: .spec.organization
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [organization, credentialType]
              properties:
                name:
                  type: string
                description:
                  type: string
                organization:
                  type: string
                credentialType:
                  type: string
                inputs:
                  type: object
                  additionalProperties:
                    type: string
                inputsFrom:
                  type: array
                  items:
                    type: object
                    required: [name, valueFrom]
                    properties:
                      name:
                        type: string
                      valueFrom:
                        type: object
                        required: [name, key]
                        properties:
                          name:
                            type: string
                          key:
                            type: string
            status:
              type: object
              properties:
                forgeId:
                  type: integer
                  format: int64
                credentialTypeId:
                  type: integer
                  format: int64
                secretsHash:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
