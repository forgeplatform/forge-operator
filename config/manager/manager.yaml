apiVersion: v1
kind: Namespace
metadata:
  name: forge-operator
---
# Forge OAuth2 Personal Access Token. Generate with:
#   kubectl -n forge exec deploy/forge-web -- forge-manage create_oauth2_token --user admin
# Then base64-encode the token and set it here, or replace stringData.
apiVersion: v1
kind: Secret
metadata:
  name: forge-credentials
  namespace: forge-operator
type: Opaque
stringData:
  token: "REPLACE_WITH_FORGE_OAUTH2_PAT"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-operator
  namespace: forge-operator
  labels:
    app.kubernetes.io/name: forge-operator
    app.kubernetes.io/part-of: forge-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: forge-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forge-operator
    spec:
      serviceAccountName: forge-operator
      containers:
        - name: manager
          image: ghcr.io/forgeplatform/forge-operator:1.0.0
          imagePullPolicy: IfNotPresent
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          env:
            # In-cluster service URL — bypasses the Ingress, plain HTTP on
            # the pod network. No Host header needed because forge-web's
            # internal nginx accepts any Host.
            - name: FORGE_URL
              value: http://forge-web.forge.svc.cluster.local:8013
            - name: FORGE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forge-credentials
                  key: token
            - name: FORGE_INSECURE
              value: "false"
          ports:
            - { name: metrics, containerPort: 8080 }
            - { name: probe, containerPort: 8081 }
          livenessProbe:
            httpGet: { path: /healthz, port: probe }
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /readyz, port: probe }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { memory: 64Mi, cpu: 50m }
            limits:   { memory: 256Mi, cpu: 500m }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
