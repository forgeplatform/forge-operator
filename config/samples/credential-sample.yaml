# Two-step pattern: first the Secret with sensitive fields, then the
# Credential CR that references it.
apiVersion: v1
kind: Secret
metadata:
  name: deploy-ssh
  namespace: default
type: Opaque
stringData:
  # Real SSH private key content goes here.
  ssh_key_data: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    placeholder-key-replace-with-real
    -----END OPENSSH PRIVATE KEY-----
---
apiVersion: forge.forgeplatform.io/v1alpha1
kind: Credential
metadata:
  name: deploy-key
  namespace: default
spec:
  description: "SSH key used by deploy automation"
  organization: Default
  credentialType: Machine
  inputs:
    username: deploy
  inputsFrom:
    - name: ssh_key_data
      valueFrom:
        name: deploy-ssh
        key: ssh_key_data
